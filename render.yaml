services:
  - type: web
    name: gakushoku-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gakushoku-db
          property: connectionString

databases:
  - name: gakushoku-db
    plan: free
